name: Build CV PDF

on:
  push:
    paths:
      - 'cv/*.tex'
      - 'cv/awesome-cv.cls'
      - 'cv/fonts/**'
      - '.github/workflows/build-cv.yml'
  workflow_dispatch:

jobs:
  build-cv:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq texlive-xetex texlive-latex-extra texlive-fonts-recommended texlive-fonts-extra latexmk fonts-font-awesome
        timeout-minutes: 5

      - name: Compile LaTeX to PDF
        run: |
          cd cv
          xelatex -interaction=nonstopmode cv.tex
          xelatex -interaction=nonstopmode cv.tex
        timeout-minutes: 3

      - name: Copy PDF to public and root
        run: |
          cp cv/cv.pdf public/cv.pdf
          cp cv/cv.pdf cv.pdf
          ls -lh cv/cv.pdf

      - name: Commit PDF
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: auto-build CV PDF from LaTeX'
          file_pattern: 'public/cv.pdf cv.pdf'
          branch: ${{ github.head_ref || github.ref_name }}
