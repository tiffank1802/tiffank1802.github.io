name: Build CV PDF

on:
  push:
    paths:
      - 'cv/cv.tex'
      - '.github/workflows/build-cv.yml'
  workflow_dispatch:

jobs:
  build-cv:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile LaTeX to PDF
        uses: dante-ev/latex-action@2021-A
        with:
          root_file: cv/cv.tex
          working_directory: cv/
          compiler: pdflatex
          args: -interaction=nonstopmode -file-line-error

      - name: Copy PDF to public and root
        run: |
          cp cv/cv.pdf public/cv.pdf
          cp cv/cv.pdf cv.pdf

      - name: Commit PDF
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: auto-build CV PDF from LaTeX'
          file_pattern: 'public/cv.pdf cv.pdf'
          branch: ${{ github.head_ref || github.ref_name }}
